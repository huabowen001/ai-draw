<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能画图助手</title>
    <style>
        :root {
            --primary-50: #eff6ff;
            --primary-100: #dbeafe;
            --primary-200: #bfdbfe;
            --primary-300: #93c5fd;
            --primary-400: #60a5fa;
            --primary-500: #3b82f6;
            --primary-600: #2563eb;
            --primary-700: #1d4ed8;
            --primary-800: #1e40af;
            --primary-900: #1e3a8a;
            
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            
            --success-50: #f0fdf4;
            --success-500: #22c55e;
            --success-600: #16a34a;
            --success-700: #15803d;
            
            --error-50: #fef2f2;
            --error-500: #ef4444;
            --error-600: #dc2626;
            --error-700: #b91c1c;
            
            --warning-50: #fffbeb;
            --warning-500: #f59e0b;
            --warning-600: #d97706;
            
            --surface: #ffffff;
            --surface-elevated: #ffffff;
            --background: #f8fafc;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            
            --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            --shadow-2xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--background);
            height: 100vh;
            padding: 0;
            margin: 0;
            color: var(--gray-900);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .viewer-section {
            background: var(--surface);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            height: 100%;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid var(--border-light);
        }

        .file-info {
            padding: 14px 16px;
            background: var(--success-50);
            border-radius: 10px;
            border: 1px solid #bbf7d0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-info::before {
            content: "📄";
            font-size: 18px;
        }

        .file-info.show {
            display: block;
        }

        .file-name {
            font-weight: 600;
            color: var(--success-700);
            font-size: 14px;
        }

        .viewer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .viewer-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 6px;
            letter-spacing: -0.025em;
        }

        .viewer-subtitle {
            font-size: 0.9rem;
            color: var(--gray-600);
            font-weight: 400;
            margin: 0;
            line-height: 1.5;
        }

        .viewer-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 40px;
            min-width: 100px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
            font-family: inherit;
            letter-spacing: -0.01em;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--primary-600);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:hover {
            background: var(--primary-700);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-primary:active {
            transform: translateY(0) scale(0.98);
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:disabled {
            background: var(--gray-300);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            color: var(--gray-500);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--gray-700);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-xs);
        }

        .btn-secondary:hover {
            background: var(--gray-50);
            border-color: var(--gray-300);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .btn-secondary:active {
            background: var(--gray-100);
            transform: scale(0.98);
        }

        .btn-secondary:disabled {
            background: var(--gray-50);
            color: var(--gray-400);
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-ai {
            background: linear-gradient(135deg, var(--primary-600) 0%, #6366f1 100%);
            color: white;
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }

        .btn-ai::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn-ai:hover::before {
            left: 100%;
        }

        .btn-ai:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.4), var(--shadow-sm);
        }

        .viewer-container {
            width: 100%;
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            background: var(--gray-50);
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05);
        }

        .viewer-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--gray-400);
            padding: 40px;
        }

        .viewer-placeholder svg {
            width: 96px;
            height: 96px;
            margin-bottom: 24px;
            opacity: 0.4;
            color: var(--gray-300);
        }

        .viewer-placeholder p {
            font-size: 1rem;
            color: var(--gray-500);
            font-weight: 500;
        }

        #drawioFrame {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--gray-200);
            border-top: 3px solid var(--primary-600);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: var(--error-50);
            color: var(--error-700);
            padding: 14px 16px;
            border-radius: 10px;
            margin-top: 16px;
            display: none;
            border: 1px solid #fecaca;
            font-size: 14px;
            font-weight: 500;
        }

        .error-message.show {
            display: block;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border-radius: 16px;
            width: 90%;
            max-width: 900px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-2xl);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--gray-900);
            letter-spacing: -0.02em;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--gray-100);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--gray-600);
            line-height: 1;
        }

        .modal-close:hover {
            background: var(--gray-200);
            color: var(--gray-900);
            transform: scale(1.05);
        }

        .modal-close:active {
            transform: scale(0.95);
        }

        .modal-close:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        .modal-body {
            padding: 24px;
            overflow: auto;
            flex: 1;
        }

        .xml-content {
            background: #1e293b;
            color: #a5f3fc;
            padding: 16px;
            border-radius: 10px;
            max-height: 60vh;
            overflow: auto;
            font-family: 'SF Mono', 'Monaco', 'Menlo', 'Consolas', monospace;
            font-size: 0.875rem;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.6;
        }

        .zoom-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .zoom-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--gray-700);
            font-weight: 600;
        }

        .zoom-btn:hover {
            background: var(--gray-50);
            border-color: var(--gray-300);
            transform: translateY(-1px);
            box-shadow: var(--shadow-lg);
        }

        .zoom-btn:active {
            transform: translateY(0) scale(0.95);
            box-shadow: var(--shadow-sm);
        }

        .zoom-btn:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        input[type="radio"]:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        input[type="radio"]:disabled + span {
            color: var(--gray-400);
            cursor: not-allowed;
        }

        input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-600);
        }

        input[type="radio"]:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        textarea {
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        textarea::placeholder {
            color: var(--gray-400);
            opacity: 1;
        }

        #aiModeSelection label {
            font-weight: 500;
            color: var(--gray-700);
        }

        #aiModeSelection input[type="radio"] + span {
            font-size: 14px;
            color: var(--gray-700);
        }

        #aiPromptLabel {
            font-weight: 600;
            color: var(--gray-800);
            font-size: 14px;
        }

        #aiPrompt {
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.6;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #aiPrompt:hover {
            border-color: var(--gray-300);
        }

        #aiPrompt:focus {
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        @media (max-width: 768px) {
            .viewer-section {
                padding: 16px;
            }

            .viewer-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .viewer-actions {
                width: 100%;
                justify-content: flex-start;
            }

            .btn {
                flex: 1;
                min-width: 0;
            }

            .viewer-title {
                font-size: 1.25rem;
            }

            .modal {
                width: 95%;
                max-height: 90vh;
            }

            .modal-header {
                padding: 20px;
            }

            .modal-body {
                padding: 20px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- <div class="header">
            <h1>Draw.io 文件查看器</h1>
            <p>选择本地 .drawio 文件进行查看和编辑</p>
        </div> -->

        <div class="viewer-section">
            <div class="viewer-header">
                <div>
                    <h2 class="viewer-title">智能画图助手</h2>
                    <p class="viewer-subtitle">支持绘制架构图、流程图、时序图等多种图表类型</p>
                </div>
                <div class="viewer-actions">
                    <button class="btn btn-ai" id="aiGenerateBtn">✨ AI助手</button>
                    <button class="btn btn-primary" id="newBtn">新建文件</button>
                    <button class="btn btn-primary" id="selectFileBtn">读取文件</button>
                    <button class="btn btn-secondary" id="previewBtn" disabled>预览文件</button>
                    <button class="btn btn-primary" id="downloadBtn" disabled>保存文件</button>
                </div>
            </div>
            <div class="file-info" id="fileInfo" style="margin-bottom: 15px; display: none;">
                <span class="file-name" id="fileName"></span>
            </div>
            <div class="error-message" id="errorMessage"></div>
            <div class="viewer-container" id="viewerContainer">
                <div class="viewer-placeholder" id="placeholder">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z" />
                    </svg>
                    <p>请选择一个 .drawio 文件</p>
                </div>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                </div>
                <iframe id="drawioFrame"></iframe>
                <div class="zoom-controls" id="zoomControls" style="display: none;">
                    <button class="zoom-btn" id="zoomIn">+</button>
                    <button class="zoom-btn" id="zoomOut">-</button>
                    <button class="zoom-btn" id="zoomReset">⟲</button>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".drawio,.xml" style="display: none;">

    <div class="modal-overlay" id="xmlModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">XML 内容预览</h3>
                <button class="modal-close" id="closeModal">×</button>
            </div>
            <div class="modal-body">
                <div class="xml-content" id="xmlContent"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="aiModal">
        <div class="modal" style="max-width: 600px;">
            <div class="modal-header">
                <h3 class="modal-title">AI 生成图表</h3>
                <button class="modal-close" id="closeAiModal">×</button>
            </div>
            <div class="modal-body">
                <div id="aiModeSelection" style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">选择操作模式：</label>
                    <div style="display: flex; gap: 15px; margin-bottom: 10px;">
                        <label style="display: flex; align-items: center; cursor: pointer;">
                            <input type="radio" name="aiMode" value="new" checked style="margin-right: 6px;">
                            <span>生成新图表</span>
                        </label>
                        <label id="optimizeLabel" style="display: flex; align-items: center; cursor: pointer;">
                            <input type="radio" name="aiMode" value="optimize" style="margin-right: 6px;">
                            <span>优化当前图表</span>
                        </label>
                    </div>
                </div>
                <div style="margin-bottom: 15px;">
                    <label for="aiPrompt" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">
                        <span id="aiPromptLabel">描述你想要生成的图表：</span>
                    </label>
                    <textarea id="aiPrompt" rows="5" style="width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; resize: vertical; font-family: inherit; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); line-height: 1.5;" placeholder="例如：生成一个用户登录流程图，包含输入用户名密码、验证、登录成功/失败等步骤"></textarea>
                </div>
                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button class="btn btn-secondary" id="cancelAiBtn">取消</button>
                    <button class="btn btn-primary" id="confirmAiBtn">生成</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
